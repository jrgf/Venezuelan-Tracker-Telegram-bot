services:
  telegram_bot_sismo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram_bot_sismo
    restart: always
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}
      - SITE_URL=${SITE_URL:-https://localizadosvenezuela.com}
      - RESPONSEGRID_API_URL=${RESPONSEGRID_API_URL:-https://api.responsegrid.app}
      - RESPONSEGRID_EMERGENCY_ID=${RESPONSEGRID_EMERGENCY_ID:-11111111-1111-4111-8111-111111111111}

